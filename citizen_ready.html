lert carries profound implications. Receiving a falsified version of this critical monoclonal antibody means being denied the vital treatment needed to fight their cancer. Instead of therapeutic benefit, patients could be unknowingly administered inert substances, incorrect dosages of active ingredients, or even harmful, undisclosed compounds. This not only allows their debilitating cancer to progress unchecked but also exposes them to unknown health risks, potentially leading to severe adverse reactions or even death. The financial and emotional toll on patients and their families, already grappling with a serious illness, is immeasurable.</p><p>The WHO's alert serves as an urgent call to action for national regulatory authorities, healthcare professionals, and the public worldwide. It underscores the pervasive and dangerous nature of criminal enterprises that exploit vulnerabilities in global pharmaceutical supply chains to peddle fraudulent medicines. Such illicit activities thrive on the desperation of patients and the high demand for life-saving drugs, demonstrating a callous disregard for human life. The prompt dissemination of this information is vital to prevent further harm and ensure that genuine, effective treatments reach those who desperately need them, while also strengthening the collective defense against this persistent global menace.</p>", "compliance_impact": "<ul><li><b>Severe Patient Health Risks:</b> Patients who receive falsified DARZALEX will not only be deprived of the active drug necessary to combat their multiple myeloma, leading to disease progression and potentially fatal outcomes, but they also risk exposure to unknown, potentially toxic ingredients or unsterile preparations.</li><li><b>Erosion of Public Trust:</b> Incidents of falsified critical medicines severely damage public confidence in healthcare systems, pharmaceutical products, and regulatory bodies, creating hesitancy among patients about the authenticity and efficacy of their prescribed treatments.</li><li><b>Significant Economic Burden:</b> Healthcare systems and governments face substantial costs associated with identifying, investigating, seizing, and disposing of falsified products, as well as managing adverse events and prolonged hospital stays resulting from ineffective or harmful treatments.</li><li><b>Increased Regulatory Scrutiny:</b> This alert will undoubtedly prompt heightened vigilance and more stringent inspections by national regulatory authorities worldwide, leading to increased pressure on pharmaceutical companies and distributors to demonstrate robust supply chain security measures.</li><li><b>Global Supply Chain Vulnerabilities Exposed:</b> The presence of falsified DARZALEX underscores the persistent vulnerabilities within the complex global pharmaceutical supply chain, highlighting the need for enhanced international cooperation, intelligence sharing, and advanced authentication technologies to combat illicit trade effectively.</li></ul>", "key_actions": "<ul><li><b>Rigorous Supply Chain Verification:</b> Healthcare providers, pharmacists, and distributors must meticulously verify the authenticity and traceability of all pharmaceutical products, ensuring procurement exclusively from authorized and reputable sources with verifiable documentation.</li><li><b>Enhanced Patient and Caregiver Vigilance:</b> Patients and their caregivers should be educated to inspect medication packaging carefully for any signs of tampering, irregularities (e.g., misspellings, unusual fonts, incorrect batch numbers/expiry dates, damaged seals), and to report any suspicions immediately to their healthcare provider.</li><li><b>Strengthened National Regulatory Oversight:</b> National regulatory authorities are advised to intensify market surveillance, conduct unannounced inspections, and invest in advanced forensic capabilities to detect falsified medicines, while actively participating in international information-sharing networks.</li><li><b>Educate and Empower the Public:</b> Governments and public health organizations should launch targeted awareness campaigns to inform the general public about the dangers of falsified medicines and provide clear channels for reporting suspicious products without fear.</li><li><b>Immediate Reporting of Suspected Products:</b> Any individual or entity encountering a suspected falsified medical product must promptly report it to their national regulatory authority, the product's manufacturer, and the WHO to facilitate rapid investigation and coordinated global action.</li></ul>", "industry_context": "<p>DARZALEX, generically known as daratumumab, is a groundbreaking monoclonal antibody approved for the treatment of multiple myeloma. Developed by Janssen Biotech, a pharmaceutical company of Johnson & Johnson, daratumumab revolutionized the treatment landscape for this complex blood cancer since its initial approval by the FDA in 2015. It works by targeting the CD38 protein, which is highly expressed on multiple myeloma cells, leading to their destruction through various immune mechanisms. Prior to DARZALEX, treatment options for multiple myeloma were more limited, and this drug has since become a vital component of combination therapies, significantly improving progression-free survival and overall survival rates for many patients, including those with relapsed or refractory disease.</p><p>Multiple myeloma is a cancer that forms in a type of white blood cell called a plasma cell, found in the bone marrow. Healthy plasma cells help fight infection by making antibodies, but in multiple myeloma, cancerous plasma cells accumulate in the bone marrow and crowd out healthy blood cells. This can lead to bone pain, kidney problems, anemia, and frequent infections, making effective and timely treatment absolutely critical. The high efficacy and high cost of advanced biologics like DARZALEX, combined with the severe and life-threatening nature of multiple myeloma, make it a prime target for falsification by criminal networks looking to profit from vulnerable patient populations and the legitimate healthcare market.</p><p>The global trade in falsified medicines is a significant and escalating public health crisis. It's estimated to be a multi-billion dollar illicit industry that undermines trust in healthcare systems, endangers lives, and complicates disease management. High-value, life-saving drugs like DARZALEX are particularly attractive targets for falsifiers due to their demand and price. These criminal operations often exploit complex global supply chains, weak regulatory enforcement in certain regions, and the anonymity offered by online pharmacies. The WHO's consistent issuance of Medical Product Alerts is a testament to the ongoing battle against these fraudulent products and the critical need for international collaboration to safeguard the integrity of the pharmaceutical supply chain.</p>", "seo_title": "Urgent WHO Alert: Falsified DARZALEX (Daratumumab) Discovered \u2013 A Critical Threat to Cancer Patients", "seo_description": "The WHO issues a critical alert on falsified DARZALEX (daratumumab), a vital multiple myeloma drug. Understand the dangers, impact on patients, and what you can do.", "primary_company_name": null, "source_url": "https://news.google.com/rss/articles/CBMixAFBVV95cUxQOURoRmc5a1NtdVVza0J6QzVIbFpMSjhIWWRYNDZRU20yV2xFaXRvUUU1VW8wLUxUSVZ4QkViWkVvWTBtNXYzSndzY2luVHBPdzdYM0Ztem0zNThaMmo0bGhVQTljd1V4aHUtTDNjVk83a29xNUxVbzA3TnltT0RldlNXMy1UaHF0S3k3cFV0MEdyMC14akFmeEJoZDlSVDRLeFlSYi1LTGItT05FNWxxZ2ZMYUlydGZBNkE4cFpIdTY1Vkcz?oc=5", "fetched_at": "2026-07-03T11:20:42.724037+00:00", "is_long_form": true}, {"id": "1a8c09a430be", "title": "Drug Shortage: Methylphenidate Hydrochloride Tablet, Extended Release", "slug": "drug-shortage-methylphenidate-hydrochloride-tablet-extended-release", "date": "2026-07-02", "category": "Drug Shortage", "severity": "Medium", "summary": "<p>Generic name: Methylphenidate Hydrochloride Tabl     const shareUrl = "https://www.zero483.com/USFDA-news?q=" + encodeURIComponent(btn.getAttribute('data-title') || "Update");
    window.open("https://www.facebook.com/sharer/sharer.php?u=" + encodeURIComponent(shareUrl), "_blank");
  };

  window.shareTwitter = function(e, btn) {
    e.preventDefault(); e.stopPropagation();
    const title = btn.getAttribute('data-title') || "Update";
    const shareUrl = "https://www.zero483.com/USFDA-news?q=" + encodeURIComponent(title);
    window.open("https://twitter.com/intent/tweet?text=" + encodeURIComponent("FDA Alert: " + title) + "&url=" + encodeURIComponent(shareUrl), "_blank");
  };

  window.shareEmail = function(e, btn) {
    e.preventDefault(); e.stopPropagation();
    const title = btn.getAttribute('data-title') || "Update";
    const shareUrl = "https://www.zero483.com/USFDA-news?q=" + encodeURIComponent(title);
    window.location.href = "mailto:?subject=" + encodeURIComponent("FDA Alert: " + title) + "&body=" + encodeURIComponent("Read more here: " + shareUrl);
  };

  window.copyShareLink = function(e, btn) {
    e.preventDefault();
    e.stopPropagation();
    const title = btn.getAttribute('data-title') || "Update";
    const shareUrl = "https://www.zero483.com/USFDA-news?q=" + encodeURIComponent(title);
    
    // Copy to clipboard
    navigator.clipboard.writeText(shareUrl).then(() => {
      // Temporarily change icon or text to show success
      const originalHtml = btn.innerHTML;
      btn.innerHTML = '<span style="font-size:12px; font-weight:normal; margin-left:2px;">Copied!</span>';
      setTimeout(() => { btn.innerHTML = originalHtml; }, 2000);
    }).catch(err => {
      console.error('Failed to copy: ', err);
      prompt("Copy this link:", shareUrl); // Fallback for older browsers
    });
  };

  // Utilities
  function stripHtml(s) {
    return String(s || '').replace(/<[^>]*>?/gm, '');
  }

  function truncateSummary(s, maxLength = 220) {
    const text = stripHtml(s);
    if (text.length <= maxLength) return text;
    return text.substring(0, maxLength).trim() + '...';
  }

  function escHtml(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function formatDate(iso) {
    try {
      return new Date(iso).toLocaleDateString('en-US', {
        month: 'long', day: 'numeric', year: 'numeric'
      });
    } catch { return iso; }
  }

  function categoryClass(cat) {
    return 'z483-badge-' + (cat || '').replace(/\s+/g,'');
  }

  // Render articles
  function renderFeed(items) {
    if (!items.length) {
      feed.innerHTML = `
        <div class="z483-state">
          <h3>✅ All Clear</h3>
          <p>No new updates were found for this category in the last 7 days. The strict 7-day filter is active.</p>
        </div>`;
      return;
    }

    feed.innerHTML = items.map(item => {
      const catClass = categoryClass(item.category);
      
      return `
        <div class="z483-card" style="cursor: pointer;" onclick="if (!window.getSelection().toString()) window.open('${escHtml(item.source_url)}', '_blank')">

              <span class="z483-badge ${catClass}">${escHtml(item.category)}</span>
            </div>

                <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                  <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>
                </svg>
              </button>
              <button class="z483-share-btn z483-share-copy" data-title="${escHtml(item.title)}" onclick="copyShareLink(event, this)" aria-label="Copy Link" title="Copy Link">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path>
                  <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path>

              <button class="z483-share-btn z483-share-fb" data-title="${escHtml(item.title)}" onclick="shareFacebook(event, this)" aria-label="Share on Facebook" title="Share on Facebook">

              </button>
              <button class="z483-share-btn z483-share-tw" data-title="${escHtml(item.title)}" onclick="shareTwitter(event, this)" aria-label="Share on Twitter" title="Share on Twitter">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M23.953 4.57a10 10 0 01-2.825.775 4.958 4.958 0 002.163-2.723c-.951.555-2.005.959-3.127 1.184a4.92 4.92 0 00-8.384 4.482C7.69 8.095 4.067 6.13 1.64 3.162a4.822 4.822 0 00-.666 2.475c0 1.71.87 3.213 2.188 4.096a4.904 4.904 0 01-2.228-.616v.06a4.923 4.923 0 003.946 4.827 4.996 4.996 0 01-2.212.085 4.936 4.936 0 004.604 3.417 9.867 9.867 0 01-6.102 2.105c-.39 0-.779-.023-1.17-.067a13.995 13.995 0 007.557 2.209c9.053 0 13.998-7.496 13.998-13.985 0-.21 0-.42-.015-.63A9.935 9.935 0 0024 4.59z"/></svg>
              </button>
              <button class="z483-share-btn z483-share-mail" data-title="${escHtml(item.title)}" onclick="shareEmail(event, this)" aria-label="Share via Email" title="Share via Email">

              </button>
              <button class="z483-share-btn z483-share-tw" data-title="${escHtml(item.title)}" onclick="shareTwitter(event, this)" aria-label="Share on Twitter" title="Share on Twitter">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M23.953 4.57a10 10 0 01-2.825.775 4.958 4.958 0 002.163-2.723c-.951.555-2.005.959-3.127 1.184a4.92 4.92 0 00-8.384 4.482C7.69 8.095 4.067 6.13 1.64 3.162a4.822 4.822 0 00-.666 2.475c0 1.71.87 3.213 2.188 4.096a4.904 4.904 0 01-2.228-.616v.06a4.923 4.923 0 003.946 4.827 4.996 4.996 0 01-2.212.085 4.936 4.936 0 004.604 3.417 9.867 9.867 0 01-6.102 2.105c-.39 0-.779-.023-1.17-.067a13.995 13.995 0 007.557 2.209c9.053 0 13.998-7.496 13.998-13.985 0-.21 0-.42-.015-.63A9.935 9.935 0 0024 4.59z"/></svg>
              </button>
              <button class="z483-share-btn z483-share-mail" data-title="${escHtml(item.title)}" onclick="shareEmail(event, this)" aria-label="Share via Email" title="Share via Email">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
              </button>

            <div style="display: flex; gap: 16px; align-items: center;">
              <a href="https://alerts.zero483.com/alerts/${escHtml(item.slug)}.html" target="_blank" onclick="event.stopPropagation();" style="font-size: 0.9rem; font-weight: 600; color: var(--z-text-muted); text-decoration: none; transition: color var(--z-transition);" onmouseover="this.style.color='var(--z-accent)'" onmouseout="this.style.color='var(--z-text-muted)'">
                ${item.is_long_form ? '⭐ Zero483 Analysis' : 'Zero483 Analysis'}
              </a>
              <a class="z483-read-link" href="${escHtml(item.source_url)}" target="_blank" rel="noopener noreferrer" onclick="event.stopPropagation();">
                Read Full Article
                <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">

    }).join('');
  }

  function applyFilters() {
    const q = searchQuery.toLowerCase().trim();
    const filtered = allItems.filter(item => {
      const matchCat = activeFilter === 'All' || item.category === activeFilter;
      if (!matchCat) return false;
      if (!q) return true;
      return (
        (item.title  || '').toLowerCase().includes(q) ||
        (item.summary|| '').toLowerCase().includes(q)
      );
    });
    renderFeed(filtered);
  }

  function init() {
    if (INJECTED_DATA && INJECTED_DATA.items) {
      allItems = INJECTED_DATA.items.filter(i => ['Recall', 'Drug Shortage', 'Adverse Event'].includes(i.category));
      
      const params = new URLSearchParams(window.location.search);
      if (params.has('q')) {
        searchQuery = params.get('q');
        searchInput.value = searchQuery;
      }
      
      applyFilters();
    } else {
      feed.innerHTML = `
        <div class="z483-state">
          <h3>No Data Available</h3>
          <p>Please run the python script to inject data.</p>
        </div>`;
    }
  }

  // Fallback data for local preview if no injected data
  if (!INJECTED_DATA) {
    setTimeout(() => {
      // If still null, just clear
      if (!allItems.length) {
        init();
      }
    }, 100);
  } else {
    init();
  }

</script>
