<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>USFDA Pharma News | Zero483</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Merriweather:wght@700;900&display=swap" rel="stylesheet" />
  <style>
    /* ─── Reset & Scope ───────────────────────────────────────────── */
    .z483-widget *,
    .z483-widget *::before,
    .z483-widget *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    /* ─── Design Tokens (Premium Light Theme) ────────────────────── */
    .z483-widget {
      --z-bg:           #f8f9fa;
      --z-surface:      #ffffff;
      --z-surface2:     #f1f5f9;
      --z-border:       #e2e8f0;
      --z-accent:       #2563eb;
      --z-accent-glow:  #1d4ed8;
      --z-text:         #0f172a;
      --z-text-muted:   #475569;
      --z-text-dim:     #64748b;
      
      --z-high:         #dc2626;
      --z-high-bg:      #fef2f2;
      --z-med:          #d97706;
      --z-med-bg:       #fffbeb;
      --z-low:          #16a34a;
      --z-low-bg:       #f0fdf4;
      
      --z-radius:       8px;
      --z-radius-sm:    6px;
      --z-shadow:       0 4px 12px rgba(0,0,0,0.05);
      --z-transition:   0.2s ease-in-out;

      font-family: 'Inter', sans-serif;
      font-size: 16px;
      line-height: 1.6;
      color: var(--z-text);
      background: var(--z-bg);
      padding: 32px 24px;
      border-radius: var(--z-radius);
      max-width: 100%;
      margin: 0;
    }

    /* ─── Header ─────────────────────────────────────────────────── */
    .z483-header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 24px;
      border-bottom: 2px solid var(--z-text);
      padding-bottom: 16px;
    }

    .z483-header-text h2 {
      font-family: 'Merriweather', serif;
      font-size: 1.8rem;
      font-weight: 900;
      color: var(--z-text);
      letter-spacing: -0.5px;
    }

    .z483-header-text p {
      font-size: 0.95rem;
      color: var(--z-text-muted);
      margin-top: 4px;
      font-weight: 500;
    }

    .z483-live-badge {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--z-high);
      background: var(--z-high-bg);
      border: 1px solid #fecaca;
      border-radius: 20px;
      padding: 6px 12px;
    }

    .z483-live-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--z-high);
      animation: z483-pulse 2s ease-in-out infinite;
    }

    @keyframes z483-pulse {
      0%   { box-shadow: 0 0 0 0 rgba(220, 38, 38, 0.4); transform: scale(1); opacity: 1; }
      70%  { box-shadow: 0 0 0 6px rgba(220, 38, 38, 0); transform: scale(1); opacity: 0.8; }
      100% { box-shadow: 0 0 0 0 rgba(220, 38, 38, 0); transform: scale(1); opacity: 1; }
    }

    /* ─── Search ─────────────────────────────────────────────────── */
    .z483-search-wrap {
      position: relative;
      margin-bottom: 20px;
    }

    .z483-search-icon {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      pointer-events: none;
      color: var(--z-text-dim);
    }

    .z483-search {
      width: 100%;
      padding: 14px 16px 14px 46px;
      background: var(--z-surface);
      border: 1px solid var(--z-border);
      border-radius: var(--z-radius-sm);
      color: var(--z-text);
      font-family: inherit;
      font-size: 1rem;
      outline: none;
      transition: border-color var(--z-transition), box-shadow var(--z-transition);
    }

    .z483-search::placeholder { color: var(--z-text-dim); }

    .z483-search:focus {
      border-color: var(--z-accent);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
    }

    /* ─── Filter Chips ───────────────────────────────────────────── */
    .z483-filters {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 28px;
    }

    .z483-chip {
      border: 1px solid var(--z-border);
      border-radius: 24px;
      padding: 8px 18px;
      font-size: 0.85rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      background: var(--z-surface);
      color: var(--z-text-muted);
      transition: all var(--z-transition);
    }

    .z483-chip:hover {
      border-color: var(--z-accent);
      color: var(--z-accent);
      background: var(--z-surface2);
    }

    .z483-chip.active {
      background: var(--z-text);
      border-color: var(--z-text);
      color: #fff;
    }

    /* ─── Feed Layout ────────────────────────────────────────────── */
    .z483-feed {
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    /* ─── Article Card ───────────────────────────────────────────── */
    .z483-card {
      background: var(--z-surface);
      border: 1px solid var(--z-border);
      border-radius: var(--z-radius);
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      text-decoration: none;
      color: inherit;
      transition: transform var(--z-transition), box-shadow var(--z-transition);
    }

    .z483-card:hover {
      transform: translateY(-2px);
      box-shadow: var(--z-shadow);
      border-color: var(--z-accent);
    }

    .z483-card-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
      border-bottom: 1px solid var(--z-border);
      padding-bottom: 12px;
    }

    .z483-badges {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .z483-badge {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 4px 10px;
      border-radius: 4px;
    }

    .z483-badge-Recall { background: var(--z-high-bg); color: var(--z-high); }
    .z483-badge-DrugShortage { background: var(--z-med-bg); color: var(--z-med); }
    .z483-badge-DrugApproval { background: var(--z-low-bg); color: var(--z-low); }
    .z483-badge-AdverseEvent { background: #fdf4ff; color: #c026d3; }
    .z483-badge-WarningLetter, .z483-badge-Form483 { background: var(--z-high-bg); color: var(--z-high); }
    .z483-badge-Guidance { background: #f0f9ff; color: #0284c7; }

    .z483-date {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--z-text-dim);
    }

    .z483-card-title {
      font-family: 'Merriweather', serif;
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--z-text);
      line-height: 1.35;
    }

    .z483-card-summary {
      font-size: 1.05rem;
      color: var(--z-text-muted);
      line-height: 1.7;
    }

    .z483-action-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: auto;
      padding-top: 16px;
    }

    .z483-read-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--z-accent);
      text-decoration: none;
      transition: gap var(--z-transition);
    }

    .z483-card:hover .z483-read-link {
      gap: 10px;
      color: var(--z-accent-glow);
    }

    /* ─── Empty / Loading ────────────────────────────────────────── */
    .z483-state {
      padding: 64px 20px;
      text-align: center;
      background: var(--z-surface);
      border: 1px dashed var(--z-border);
      border-radius: var(--z-radius);
    }

    .z483-state h3 {
      font-family: 'Merriweather', serif;
      font-size: 1.4rem;
      color: var(--z-text);
      margin-bottom: 8px;
    }

    .z483-state p { font-size: 1rem; color: var(--z-text-muted); }

    /* Skeleton loader */
    .z483-skeleton {
      background: var(--z-surface);
      border: 1px solid var(--z-border);
      border-radius: var(--z-radius);
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .z483-skel-bar {
      background: var(--z-surface2);
      border-radius: 4px;
      animation: z483-shimmer 1.5s ease-in-out infinite;
    }

    @keyframes z483-shimmer {
      0%, 100% { opacity: 0.5; }
      50%       { opacity: 1; }
    }

  </style>
</head>

  const feed         = document.getElementById('z483-feed');
  const searchInput  = document.getElementById('z483-search');
  const filterWrap   = document.getElementById('z483-filters');
  
  let allItems     = [];
  let activeFilter = 'All';
  let searchQuery  = '';

  // Setup events
  searchInput.addEventListener('input', (e) => {
    searchQuery = e.target.value;
    applyFilters();
  });

  filterWrap.addEventListener('click', (e) => {
    if (e.target.tagName !== 'BUTTON') return;
    document.querySelectorAll('.z483-chip').forEach(btn => btn.classList.remove('active'));
    e.target.classList.add('active');
    activeFilter = e.target.getAttribute('data-filter');
    applyFilters();
  });

  // Utilities
  function escHtml(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function formatDate(iso) {
    try {
      return new Date(iso).toLocaleDateString('en-US', {
        month: 'long', day: 'numeric', year: 'numeric'
      });
    } catch { return iso; }
  }

  function categoryClass(cat) {
    return 'z483-badge-' + (cat || '').replace(/\s+/g,'');
  }

  // Render articles
  function renderFeed(items) {
    if (!items.length) {
      feed.innerHTML = `
        <div class="z483-state">
          <h3>✅ All Clear</h3>
          <p>No new updates were found for this category in the last 7 days. The strict 7-day filter is active.</p>
        </div>`;
      return;
    }

    feed.innerHTML = items.map(item => {
      const catClass = categoryClass(item.category);
      
      return `
        <a class="z483-card" href="${escHtml(item.source_url)}" target="_blank" rel="noopener noreferrer">
          <header class="z483-card-top">
            <div class="z483-badges">
              <span class="z483-badge ${catClass}">${escHtml(item.category)}</span>
            </div>
            <time class="z483-date">${formatDate(item.date)}</time>
          </header>
          
          <h3 class="z483-card-title">${escHtml(item.title)}</h3>
          <p class="z483-card-summary">${escHtml(item.summary)}</p>
          
          <div class="z483-action-row">
            <span class="z483-read-link">
              Read Full Article
              <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                <path d="M5 12h14M12 5l7 7-7 7"/>
              </svg>
            </span>
          </div>
        </a>`;
    }).join('');
  }

  function applyFilters() {
    const q = searchQuery.toLowerCase().trim();
    const filtered = allItems.filter(item => {
      const matchCat = activeFilter === 'All' || item.category === activeFilter;
      if (!matchCat) return false;
      if (!q) return true;
      return (
        (item.title  || '').toLowerCase().includes(q) ||
        (item.summary|| '').toLowerCase().includes(q)
      );
    });
    renderFeed(filtered);
  }

  function init() {
    if (INJECTED_DATA && INJECTED_DATA.items) {
      allItems = INJECTED_DATA.items;
      applyFilters();
    } else {
      feed.innerHTML = `
        <div class="z483-state">
          <h3>No Data Available</h3>
          <p>Please run the python script to inject data.</p>
        </div>`;
    }
  }

  // Fallback data for local preview if no injected data
  if (!INJECTED_DATA) {
    setTimeout(() => {
      // If still null, just clear
      if (!allItems.length) {
        init();
      }
    }, 100);
  } else {
    init();
  }

</script>
