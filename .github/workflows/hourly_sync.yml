name: Hourly Sync & Welcome Agent

on:
  schedule:
    # Runs at minute 13 past every hour (off-peak to avoid GitHub queue delays)
    - cron: '13 * * * *'
  workflow_dispatch: # Allows manual trigger

jobs:
  run-sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install python-dotenv

    - name: Run Sync Agent
      env:
        IMAP_HOST: ${{ secrets.IMAP_HOST }}
        SMTP_HOST: ${{ secrets.SMTP_HOST }}
        SMTP_PORT: ${{ secrets.SMTP_PORT }}
        SMTP_USER: ${{ secrets.SMTP_USER }}
        SMTP_PASS: ${{ secrets.SMTP_PASS }}
      run: |
        python sync_agent.py

    - name: Commit Updated Subscribers
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git pull --rebase origin main
        git add subscribers.txt || echo "No new subscribers to add"
        git diff --cached --quiet && echo "No changes to commit" && exit 0
        git commit -m "Auto-sync new subscribers via IMAP"
        git push origin HEAD:main
