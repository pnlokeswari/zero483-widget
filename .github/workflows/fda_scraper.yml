name: Daily FDA Scraper

on:
  schedule:
    - cron: '47 * * * *'
  workflow_dispatch:

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        pip install feedparser

    - name: Run Python Script
      env:
        GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        FDA_API_KEY: ${{ secrets.FDA_API_KEY }}
      run: |
        python fda_news_processor.py

    - name: Commit Updated Database
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git pull --rebase --autostash origin main
        git add news_database.json widget_ready_for_zoho.html citizen_ready.html feed.xml index.html citizen.html || echo "Some files not found"
        git add --all alerts/ || echo "Staging individual alerts including deletions"
        git add *.html *.json *.xml || echo "Staging catch-all"
        git diff --cached --quiet && echo "No changes to commit" && exit 0
        git commit -m "Auto-update FDA news database, widgets, and SEO pages"
        git push origin HEAD:main
