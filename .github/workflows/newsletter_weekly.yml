name: Weekly Newsletter Agent

on:
  schedule:
    # Runs at 9:11 AM IST (3:41 AM UTC) every Friday (off-peak to avoid GitHub queue delays)
    - cron: '41 3 * * 5'
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  run-newsletter:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        pip install google-generativeai python-dotenv

    - name: Run Newsletter Agent
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        SMTP_HOST: ${{ secrets.SMTP_HOST }}
        SMTP_PORT: ${{ secrets.SMTP_PORT }}
        SMTP_USER: ${{ secrets.SMTP_USER }}
        SMTP_PASS: ${{ secrets.SMTP_PASS }}
      run: |
        python newsletter_agent.py

    - name: Commit SEO Archive Updates
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add newsletters/*.html || echo "No new newsletters"
        git add newsletter_archive.html sitemap.xml || echo "No changes to index"
        git commit -m "Auto-publish weekly newsletter archive for SEO" || echo "No changes to commit"
        git pull --rebase origin main
        git push
